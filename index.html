<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocabMaster - SRS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* TYPOGRAPHY */
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-muted); line-height: 1.5; }

        /* HEADER */
        header {
            padding: 1.5rem;
            text-align: center;
        }

        /* VIEWS */
        .view {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding: 1.5rem;
            animation: fadeIn 0.3s ease-out;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* DASHBOARD */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary-light); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 1.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: auto;
        }

        .start-btn:active { transform: scale(0.98); }

        /* REVIEW VIEW */
        .review-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-back { transform: rotateY(180deg); background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); }

        .card-text { font-size: 2.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card-label { font-size: 0.9rem; color: var(--primary-light); text-transform: uppercase; font-weight: 600; }

        .review-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            width: 100%;
            margin-top: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .review-actions.visible { opacity: 1; pointer-events: auto; }

        .score-btn {
            border: none;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-again { background: #475569; }
        .btn-hard { background: #ea580c; }
        .btn-good { background: #2563eb; }
        .btn-easy { background: #16a34a; }

        /* FORM VIEW */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* TAB BAR */
        .tab-bar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.7rem;
            gap: 0.2rem;
            cursor: pointer;
        }

        .tab-item.active { color: var(--primary-light); }

        .tab-icon { font-size: 1.5rem; }

        /* UTILS */
        .badge { background: var(--secondary); color: white; padding: 0.2rem 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; margin-left: 0.5rem; }
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>

<div id="app">
    <!-- VIEW: DASHBOARD -->
    <div id="view-dashboard" class="view active">
        <header>
            <h1>VocabMaster</h1>
            <p>Prêt pour votre session quotidienne ?</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div id="stat-due" class="stat-value">0</div>
                <div class="stat-label">À réviser</div>
            </div>
            <div class="stat-card">
                <div id="stat-total" class="stat-value">0</div>
                <div class="stat-label">Total mots</div>
            </div>
        </div>

        <button class="start-btn" onclick="startSession()">DÉMARRER LA SESSION</button>
    </div>

    <!-- VIEW: REVIEW -->
    <div id="view-review" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <span id="review-progress">1 / 10</span>
            <span onclick="switchView('dashboard')" style="cursor: pointer; color: var(--text-muted);">Quitter</span>
        </div>

        <div class="review-container">
            <div id="flashcard" class="card" onclick="flipCard()">
                <div class="card-face card-front">
                    <div class="card-label" id="card-front-label">Français</div>
                    <div class="card-text" id="card-front-text">Bonjour</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-label" id="card-back-label">Anglais</div>
                    <div class="card-text" id="card-back-text">Hello</div>
                </div>
            </div>

            <div id="review-actions" class="review-actions">
                <button class="score-btn btn-again" onclick="submitScore(1)">
                    <span>Revoir</span>
                    <span style="font-size: 0.6rem; opacity: 0.7;">1m</span>
                </button>
                <button class="score-btn btn-hard" onclick="submitScore(3)">
                    <span>Dur</span>
                    <span id="label-hard" style="font-size: 0.6rem; opacity: 0.7;">2j</span>
                </button>
                <button class="score-btn btn-good" onclick="submitScore(4)">
                    <span>Bien</span>
                    <span id="label-good" style="font-size: 0.6rem; opacity: 0.7;">4j</span>
                </button>
                <button class="score-btn btn-easy" onclick="submitScore(5)">
                    <span>Facile</span>
                    <span id="label-easy" style="font-size: 0.6rem; opacity: 0.7;">7j</span>
                </button>
            </div>
        </div>
    </div>

    <!-- VIEW: ADD -->
    <div id="view-add" class="view">
        <h1>Nouveau Mot</h1>
        <p>Ajoutez un mot à votre bibliothèque.</p>
        
        <div style="margin-top: 2rem;">
            <div class="form-group">
                <label>Français</label>
                <input type="text" id="input-fr" placeholder="ex: Pomme">
            </div>
            <div class="form-group">
                <label>Anglais</label>
                <input type="text" id="input-en" placeholder="ex: Apple">
            </div>
            <button class="start-btn" onclick="saveWord()">ENREGISTRER</button>
        </div>
    </div>

    <!-- VIEW: LIST -->
    <div id="view-list" class="view">
        <h1>Ma Bibliothèque</h1>
        <div id="word-list" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.8rem;">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- TAB BAR -->
    <nav class="tab-bar">
        <div class="tab-item active" onclick="switchView('dashboard')">
            <span class="tab-icon">🏠</span>
            <span>Accueil</span>
        </div>
        <div class="tab-item" onclick="switchView('add')">
            <span class="tab-icon">➕</span>
            <span>Ajouter</span>
        </div>
        <div class="tab-item" onclick="switchView('list')">
            <span class="tab-icon">📚</span>
            <span>Mots</span>
        </div>
    </nav>
</div>

<script>
    // --- DATABASE (IndexedDB) ---
    let db;
    const initialVocab = [
        { en: "Postpone", fr: "Remettre à plus tard / reporter" },
        { en: "Implement", fr: "Appliquer" },
        { en: "else", fr: "Quoi d'autre" },
        { en: "Other ways", fr: "Autre manières / autre chemins" },
        { en: "Get used to", fr: "S'habituer à" },
        { en: "Be used to", fr: "Etre habitué à" },
        { en: "I am getting used to", fr: "Je suis en train de m'habituer à" },
        { en: "Foot traffic", fr: "Circulation piétonne" },
        { en: "Defer", fr: "Reporter" },
        { en: "Diter", fr: "Dire" },
        { en: "Differ", fr: "Différer" },
        { en: "Deflect", fr: "Dévier" },
        { en: "Share price", fr: "Action (d'entreprise)" },
        { en: "So far", fr: "Jusqu'à présent" },
        { en: "A survey", fr: "Enquête, sondage" },
        { en: "Ensure", fr: "S'assurer" },
        { en: "The board of director", fr: "Le conseil d'administration" },
        { en: "Currently", fr: "Actuellement (action en cours)" },
        { en: "Quarter", fr: "Trimestre" },
        { en: "Upcoming", fr: "À venir" },
        { en: "By the time", fr: "Au moment de/où" },
        { en: "Regarding", fr: "Concernant" },
        { en: "Complaint", fr: "Plainte" },
        { en: "Roughly", fr: "Grossièrement" },
        { en: "Strikes", fr: "Grève / force de frappe" },
        { en: "Wounded", fr: "Blessé" },
        { en: "Ceasefire", fr: "Cessez-le-feu" },
        { en: "Take over", fr: "Prendre le contrôle" },
        { en: "Conveyance", fr: "Transfert (logistique)" },
        { en: "Convenience", fr: "Pratique / commode" },
        { en: "Unforeseen", fr: "Imprévu" },
        { en: "Barring", fr: "Sauf en cas de" },
        { en: "Assuming", fr: "En supposant" },
        { en: "Stated", fr: "Déclaré" },
        { en: "Compliant", fr: "Conforme" },
        { en: "Revamp", fr: "Rénover" },
        { en: "Relapse", fr: "Rechute" },
        { en: "Accrued", fr: "Accumuler / réunir progressivement" },
        { en: "Adhered", fr: "Respecter" },
        { en: "Accosted", fr: "Abordé" },
        { en: "Comply", fr: "Se conformer" },
        { en: "Curtail", fr: "Limiter / réduire" },
        { en: "Commitment", fr: "Engagement" },
        { en: "Prompted", fr: "Provoqué / suscité par" }
    ];

    const request = indexedDB.open("VocabDB", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        const store = db.createObjectStore("words", { keyPath: "id", autoIncrement: true });
        store.createIndex("nextReview", "nextReview");
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        seedDatabase().then(() => {
            updateStats();
        });
    };

    request.onerror = (e) => {
        console.error("IDB Error:", e);
        switchView('dashboard'); // Show UI even if DB fails
    };

    async function seedDatabase() {
        return new Promise(resolve => {
            const tx = db.transaction("words", "readwrite");
            const store = tx.objectStore("words");
            const countReq = store.count();
            
            countReq.onsuccess = () => {
                if (countReq.result === 0) {
                    let added = 0;
                    initialVocab.forEach(item => {
                        const addReq = store.add({
                            ...item,
                            repetition: 0,
                            interval: 0,
                            efactor: 2.5,
                            direction: 'FR_EN',
                            nextReview: Date.now(),
                            createdAt: Date.now()
                        });
                        addReq.onsuccess = () => {
                            added++;
                            if(added === initialVocab.length) resolve();
                        };
                    });
                } else {
                    resolve();
                }
            };
            countReq.onerror = () => resolve();
        });
    }

    // Initialize UI immediately
    window.addEventListener('DOMContentLoaded', () => {
        switchView('dashboard');
    });

    // --- APP STATE ---
    let sessionQueue = [];
    let currentCardIndex = 0;
    let isFlipped = false;

    // --- SRS LOGIC (Simplified SM-2) ---
    function calculateSM2(item, quality) {
        let { repetition, interval, efactor } = item;

        if (quality < 3) {
            repetition = 0;
            interval = 1;
        } else {
            if (repetition === 0) {
                interval = 1;
            } else if (repetition === 1) {
                interval = 6;
            } else {
                interval = Math.round(interval * efactor);
            }
            repetition++;
        }

        // Adjust efactor
        efactor = efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
        if (efactor < 1.3) efactor = 1.3;

        // Logic for direction flip: 
        // If they succeed at level 1 (FR->EN), next time might be level 2 (EN->FR)
        // For simplicity, we just alternate if repetition > 0
        let direction = (repetition % 2 === 0) ? 'EN_FR' : 'FR_EN';

        return { repetition, interval, efactor, direction };
    }

    // --- ACTIONS ---
    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        // Find matching tab
        const tabs = ['dashboard', 'add', 'list'];
        const index = tabs.indexOf(viewName);
        if(index !== -1) document.querySelectorAll('.tab-item')[index].classList.add('active');

        if(viewName === 'list') renderList();
        if(viewName === 'dashboard') updateStats();
    }

    async function saveWord() {
        const fr = document.getElementById('input-fr').value.trim();
        const en = document.getElementById('input-en').value.trim();
        
        if(!fr || !en) return alert("Remplissez les deux champs !");

        const word = {
            fr, en,
            repetition: 0,
            interval: 0,
            efactor: 2.5,
            direction: 'FR_EN',
            nextReview: Date.now(),
            createdAt: Date.now()
        };

        const tx = db.transaction("words", "readwrite");
        tx.objectStore("words").add(word);
        tx.oncomplete = () => {
            document.getElementById('input-fr').value = '';
            document.getElementById('input-en').value = '';
            alert("Mot ajouté !");
            switchView('dashboard');
        };
    }

    async function getDueWords() {
        return new Promise(resolve => {
            const tx = db.transaction("words", "readonly");
            const store = tx.objectStore("words");
            const request = store.getAll();
            request.onsuccess = () => {
                const now = Date.now();
                const all = request.result;
                
                // 1. Get words that are actually due
                let due = all.filter(w => w.nextReview <= now);
                
                // 2. Separate into "New" and "Long Term"
                const newWords = all.filter(w => w.repetition === 0).sort((a,b) => b.createdAt - a.createdAt);
                const oldWords = due.filter(w => w.repetition > 0);
                
                // 3. User wants 10 recent words + some older
                // We take up to 10 from the 'newWords' (recent) even if not "due" yet (if newly added)
                const recentToStudy = newWords.slice(0, 10);
                const longTermToStudy = oldWords;
                
                // Combine and remove duplicates
                const finalSet = new Set([...recentToStudy, ...longTermToStudy]);
                resolve(Array.from(finalSet));
            };
        });
    }

    async function updateStats() {
        if(!db) return;
        const tx = db.transaction("words", "readonly");
        const store = tx.objectStore("words");
        const countReq = store.count();
        countReq.onsuccess = () => {
            document.getElementById('stat-total').innerText = countReq.result;
        };
        
        const due = await getDueWords();
        document.getElementById('stat-due').innerText = due.length;
    }

    async function startSession() {
        const due = await getDueWords();
        if(due.length === 0) return alert("Bravo ! Aucune révision aujourd'hui.");
        
        sessionQueue = due.slice(0, 20); // Max 20 cards per session
        currentCardIndex = 0;
        showCard();
        switchView('review');
    }

    function showCard() {
        const word = sessionQueue[currentCardIndex];
        isFlipped = false;
        document.getElementById('flashcard').classList.remove('flipped');
        document.getElementById('review-actions').classList.remove('visible');
        document.getElementById('review-progress').innerText = `${currentCardIndex + 1} / ${sessionQueue.length}`;

        const frontLabel = document.getElementById('card-front-label');
        const frontText = document.getElementById('card-front-text');
        const backLabel = document.getElementById('card-back-label');
        const backText = document.getElementById('card-back-text');

        if(word.direction === 'FR_EN') {
            frontLabel.innerText = "Français";
            frontText.innerText = word.fr;
            backLabel.innerText = "Anglais";
            backText.innerText = word.en;
        } else {
            frontLabel.innerText = "Anglais";
            frontText.innerText = word.en;
            backLabel.innerText = "Français";
            backText.innerText = word.fr;
        }
    }

    function flipCard() {
        if(isFlipped) return;
        isFlipped = true;
        document.getElementById('flashcard').classList.add('flipped');
        document.getElementById('review-actions').classList.add('visible');
        
        // Update labels for next intervals (simulated preview)
        const word = sessionQueue[currentCardIndex];
        document.getElementById('label-hard').innerText = (word.interval < 1 ? '1j' : Math.max(1, Math.round(word.interval * 1.2)) + 'j');
        document.getElementById('label-good').innerText = (word.interval < 1 ? '3j' : Math.max(2, Math.round(word.interval * word.efactor)) + 'j');
        document.getElementById('label-easy').innerText = (word.interval < 1 ? '7j' : Math.max(4, Math.round(word.interval * word.efactor * 1.5)) + 'j');
    }

    async function submitScore(quality) {
        const word = sessionQueue[currentCardIndex];
        const result = calculateSM2(word, quality);
        
        const updatedWord = {
            ...word,
            repetition: result.repetition,
            interval: result.interval,
            efactor: result.efactor,
            direction: result.direction,
            nextReview: Date.now() + (result.interval * 24 * 60 * 60 * 1000)
        };

        const tx = db.transaction("words", "readwrite");
        tx.objectStore("words").put(updatedWord);
        
        tx.oncomplete = () => {
            currentCardIndex++;
            if(currentCardIndex < sessionQueue.length) {
                showCard();
            } else {
                alert("Session terminée !");
                switchView('dashboard');
            }
        };
    }

    function renderList() {
        const tx = db.transaction("words", "readonly");
        const store = tx.objectStore("words");
        const request = store.getAll();
        request.onsuccess = () => {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            request.result.forEach(w => {
                const div = document.createElement('div');
                div.className = 'stat-card';
                div.style.textAlign = 'left';
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.alignItems = 'center';
                div.innerHTML = `
                    <div>
                        <div style="font-weight: 600;">${w.fr} <span style="color: var(--primary-light);">→</span> ${w.en}</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem;">
                            Prochaine révision : ${new Date(w.nextReview).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="badge">${w.interval}j</div>
                `;
                list.appendChild(div);
            });
        };
    }

</script>

</body>
</html>
