<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocabMaster - SRS</title>
    <style>
        :root { --primary: #6366f1; --background: #0f172a; --text: #f8fafc; --text-muted: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: var(--background); color: var(--text); height: 100vh; overflow: hidden; }
        #app { height: 100%; display: flex; flex-direction: column; padding: 20px; }
        .view { display: none; flex: 1; flex-direction: column; }
        .view.active { display: flex; }
        .card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 40px; text-align: center; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .tab-bar { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .tab-item { color: var(--text-muted); cursor: pointer; font-size: 14px; }
        .tab-item.active { color: white; font-weight: bold; }
        .stat-card { background: rgba(30,41,59,0.5); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        h1 { margin-bottom: 10px; color: white; }
    </style>
</head>
<body>

<div id="app">
    <!-- DASHBOARD -->
    <div id="view-dashboard" class="view active">
        <h1>VocabMaster</h1>
        <div class="stat-card">Apprentissage en cours...</div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="stat-card" style="flex:1">À réviser: <span id="stat-due">0</span></div>
            <div class="stat-card" style="flex:1">Total: <span id="stat-total">0</span></div>
        </div>
        <button class="btn" onclick="startSession()">DÉMARRER LA SESSION</button>
    </div>

    <!-- REVIEW -->
    <div id="view-review" class="view">
        <div style="display:flex; justify-content:space-between">
            <span id="review-progress">0/0</span>
            <span onclick="switchView('dashboard')">Sortir</span>
        </div>
        <div class="card" onclick="flipCard()">
            <div id="card-text" style="font-size: 24px; font-weight: bold;">Chargement...</div>
            <div id="card-hint" style="color:var(--text-muted); margin-top:10px;">Cliquer pour voir</div>
        </div>
        <div id="actions" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#475569" onclick="submitScore(1)">Revoir</button>
            <button class="btn" style="background:#ea580c" onclick="submitScore(3)">Dur</button>
            <button class="btn" style="background:#2563eb" onclick="submitScore(4)">Bien</button>
            <button class="btn" style="background:#16a34a" onclick="submitScore(5)">Facile</button>
        </div>
    </div>

    <!-- LIST -->
    <div id="view-list" class="view">
        <h1>Ma Bibliothèque</h1>
        <div id="word-list"></div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchView('dashboard')">Accueil</div>
        <div class="tab-item" onclick="switchView('list')">Mots</div>
    </div>
</div>

<script>
    const vocabulary = [
        { en: "Postpone", fr: "Remettre à plus tard / reporter" },
        { en: "Implement", fr: "Appliquer" },
        { en: "else", fr: "Quoi d'autre" },
        { en: "Other ways", fr: "Autre manières / autre chemins" },
        { en: "Get used to", fr: "S'habituer à" },
        { en: "Be used to", fr: "Etre habitué à" },
        { en: "I am getting used to", fr: "Je suis en train de m'habituer à" },
        { en: "Foot traffic", fr: "Circulation piétonne" },
        { en: "Defer", fr: "Reporter" },
        { en: "Diter", fr: "Dire" },
        { en: "Differ", fr: "Différer" },
        { en: "Deflect", fr: "Dévier" },
        { en: "Share price", fr: "Action (d'entreprise)" },
        { en: "So far", fr: "Jusqu'à présent" },
        { en: "A survey", fr: "Enquête, sondage" },
        { en: "Ensure", fr: "S'assurer" },
        { en: "The board of director", fr: "Le conseil d'administration" },
        { en: "Currently", fr: "Actuellement (action en cours)" },
        { en: "Quarter", fr: "Trimestre" },
        { en: "Upcoming", fr: "À venir" },
        { en: "By the time", fr: "Au moment de/où" },
        { en: "Regarding", fr: "Concernant" },
        { en: "Complaint", fr: "Plainte" },
        { en: "Roughly", fr: "Grossièrement" },
        { en: "Strikes", fr: "Grève / force de frappe" },
        { en: "Wounded", fr: "Blessé" },
        { en: "Ceasefire", fr: "Cessez-le-feu" },
        { en: "Take over", fr: "Prendre le contrôle" },
        { en: "Conveyance", fr: "Transfert (logistique)" },
        { en: "Convenience", fr: "Pratique / commode" },
        { en: "Unforeseen", fr: "Imprévu" },
        { en: "Barring", fr: "Sauf en cas de" },
        { en: "Assuming", fr: "En supposant" },
        { en: "Stated", fr: "Déclaré" },
        { en: "Compliant", fr: "Conforme" },
        { en: "Revamp", fr: "Rénover" },
        { en: "Relapse", fr: "Rechute" },
        { en: "Accrued", fr: "Accumuler / réunir progressivement" },
        { en: "Adhered", fr: "Respecter" },
        { en: "Accosted", fr: "Abordé" },
        { en: "Comply", fr: "Se conformer" },
        { en: "Curtail", fr: "Limiter / réduire" },
        { en: "Commitment", fr: "Engagement" },
        { en: "Prompted", fr: "Provoqué / suscité par" }
    ];

    let db;
    let session = [];
    let currentIndex = 0;
    let flipped = false;

    // Database
    const req = indexedDB.open("VocabDB", 2);
    req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if(!d.objectStoreNames.contains("words")) {
            d.createObjectStore("words", { keyPath: "id", autoIncrement: true });
        }
    };
    req.onsuccess = (e) => {
        db = e.target.result;
        initData();
    };

    function initData() {
        const tx = db.transaction("words", "readwrite");
        const store = tx.objectStore("words");
        store.count().onsuccess = (ev) => {
            if(ev.target.result === 0) {
                vocabulary.forEach(v => store.add({...v, repetition:0, interval:0, efactor:2.5, direction:'FR_EN', nextReview:Date.now()}));
            }
            updateStats();
        };
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        if(v === 'list') renderList();
        updateStats();
    }

    function updateStats() {
        if(!db) return;
        const store = db.transaction("words").objectStore("words");
        store.count().onsuccess = (e) => document.getElementById('stat-total').innerText = e.target.result;
        store.getAll().onsuccess = (e) => {
            const due = e.target.result.filter(w => w.nextReview <= Date.now());
            document.getElementById('stat-due').innerText = due.length;
        };
    }

    function renderList() {
        db.transaction("words").objectStore("words").getAll().onsuccess = (e) => {
            document.getElementById('word-list').innerHTML = e.target.result.map(w => `<div class="stat-card"><b>${w.fr}</b> -> ${w.en}</div>`).join('');
        };
    }

    function startSession() {
        db.transaction("words").objectStore("words").getAll().onsuccess = (e) => {
            session = e.target.result.filter(w => w.nextReview <= Date.now()).slice(0, 20);
            if(session.length === 0) return alert("Rien à réviser !");
            currentIndex = 0;
            showCard();
            switchView('review');
        };
    }

    function showCard() {
        flipped = false;
        const w = session[currentIndex];
        document.getElementById('card-text').innerText = w.direction === 'FR_EN' ? w.fr : w.en;
        document.getElementById('card-hint').innerText = "Cliquer pour voir";
        document.getElementById('actions').style.display = 'none';
        document.getElementById('review-progress').innerText = (currentIndex+1)+"/"+session.length;
    }

    function flipCard() {
        if(flipped) return;
        flipped = true;
        const w = session[currentIndex];
        document.getElementById('card-text').innerText = w.direction === 'FR_EN' ? w.en : w.fr;
        document.getElementById('card-hint').innerText = "Vérifié !";
        document.getElementById('actions').style.display = 'grid';
    }

    function submitScore(q) {
        const w = session[currentIndex];
        let {repetition:r, interval:i, efactor:f} = w;
        if(q < 3) { r=0; i=1; } else {
            if(r===0) i=1; else if(r===1) i=6; else i=Math.round(i*f);
            r++;
        }
        f = Math.max(1.3, f + (0.1 - (5-q) * (0.08 + (5-q) * 0.02)));
        const up = {...w, repetition:r, interval:i, efactor:f, nextReview: Date.now() + i*86400000, direction: r%2===0?'EN_FR':'FR_EN'};
        db.transaction("words", "readwrite").objectStore("words").put(up).onsuccess = () => {
            currentIndex++;
            if(currentIndex < session.length) showCard(); else switchView('dashboard');
        };
    }
</script>

</body>
</html>
