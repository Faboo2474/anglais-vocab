<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocabMaster Game Edition</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #f472b6;
            --accent: #22d3ee;
            --background: #070b14;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--background);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.1) 0%, transparent 40%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top, 20px);
        }

        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px;
        }

        .view.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(124, 58, 237, 0); }
            100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
        }

        .header {
            padding: 10px;
            text-align: center;
        }

        .xp-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .xp-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s;
            width: 0%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 10px 0;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-val {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(7, 11, 20, 0.9));
            border-radius: 30px;
            padding: 30px 15px;
            text-align: center;
            margin: 15px 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom, 20px));
            /* MARGE ACCRUE ICI */
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            gap: 5px;
            flex: 1;
        }

        .tab-item.active {
            color: var(--primary-light);
            font-weight: bold;
        }

        .tab-icon {
            font-size: 24px;
        }

        .word-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        .sentence-box {
            font-size: 16px;
            line-height: 1.5;
            color: #fff;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* REBUS STYLES */
        .rebus-letters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .letter-tile {
            width: 45px;
            height: 45px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--primary);
        }

        .letter-tile:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--primary);
        }

        .letter-tile.used {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.9);
        }

        .rebus-answer {
            min-height: 60px;
            border-bottom: 3px solid var(--accent);
            margin-bottom: 20px;
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent);
        }
        
        .hint-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .hint-text {
            font-size: 13px;
            color: var(--accent);
            margin-top: 10px;
            font-style: italic;
            animation: fadeIn 0.3s;
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- DASHBOARD -->
        <div id="view-dashboard" class="view active">
            <div class="header">
                <img src="logo.png" style="width: 120px; height: 120px; margin-bottom: 10px; animation: fadeIn 1s ease-out; filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.5));">
                <h2 id="user-level" style="font-size:1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Niveau 1</h2>
                <div class="xp-bar">
                    <div id="xp-progress" class="xp-progress"></div>
                </div>
                <p style="margin-top:10px; font-size:12px; font-weight: 700; color: var(--text-muted);"><span id="user-xp">0</span> / 100 XP</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="stat-streak" class="stat-val">🔥 0</div>
                    <div style="font-size:10px; color:var(--text-muted)">SERIE</div>
                </div>
                <div class="stat-card">
                    <div id="stat-due" class="stat-val">0</div>
                    <div style="font-size:10px; color:var(--text-muted)">A REVISER</div>
                </div>
            </div>
            <button class="btn" style="background: linear-gradient(135deg, #6366f1, #ec4899); height: 80px;"
                onclick="startSession()">RÉVISER</button>
        </div>

        <!-- REVIEW -->
        <div id="view-review" class="view">
            <div
                style="display:flex; justify-content:space-between; align-items:center; position: sticky; top: 0; background: var(--background); z-index: 10; padding-bottom: 10px;">
                <span id="review-progress" style="font-size:12px; color:var(--text-muted)">0/0</span>
                <span id="mode-badge"
                    style="background:var(--primary); padding:3px 10px; border-radius:15px; font-size:10px;">EXERCICE</span>
                <span onclick="switchView('dashboard')"
                    style="color:var(--text-muted); cursor: pointer; padding: 5px;">Quitter</span>
            </div>
            <div class="card" id="main-card">
                <div id="card-question" style="font-size: 12px; font-weight: 700; text-transform: uppercase; color:var(--accent); margin-bottom:15px; letter-spacing: 1px;">...</div>
                <div id="card-main-text" style="font-size: 32px; font-weight: 900; color: #fff;">...</div>
                
                <!-- REBUS ZONE -->
                <div id="rebus-zone" style="display:none; margin-top:20px;">
                    <div id="rebus-answer" class="rebus-answer"></div>
                    <div id="rebus-letters" class="rebus-letters"></div>
                </div>

                <!-- HINT ZONE -->
                <div id="hint-zone" style="margin-top: 15px;">
                    <button class="hint-btn" id="btn-hint" onclick="getAIHint()">
                        <span>💡</span> INDICE IA
                    </button>
                    <div id="hint-display" class="hint-text" style="display:none;"></div>
                </div>
            </div>
            <div id="flash-actions"><button class="btn" onclick="revealCard()">RÉPONSE</button></div>
            <div id="score-actions" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                <button class="btn" style="background:#475569" onclick="submitScore(1)">Revoir</button>
                <button class="btn" style="background:#ea580c" onclick="submitScore(3)">Dur</button>
                <button class="btn" style="background:#2563eb" onclick="submitScore(4)">Bien</button>
                <button class="btn" style="background:#16a34a" onclick="submitScore(5)">Facile</button>
            </div>
        </div>

        <!-- LIST -->
        <div id="view-list" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h1 style="font-size:1.5rem">Mots</h1>
                <button class="btn" style="width:auto; padding:8px 15px; margin:0;"
                    onclick="showEditForm(null, '', '')">+ AJOUTER</button>
            </div>
            <div id="word-list"></div>
        </div>

        <!-- EDIT -->
        <div id="view-edit" class="view">
            <h2 id="edit-title">Éditer</h2>
            <div style="margin-top:15px;">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-fr" placeholder="Français">
                <input type="text" id="edit-en" placeholder="Anglais">
                <button class="btn" onclick="saveWord()">SAUVER</button>
                <button id="del-btn" class="btn" style="background:#ef4444" onclick="deleteWord()">SUPPRIMER</button>
                <button class="btn" style="background:transparent; border:1px solid rgba(255,255,255,0.1)"
                    onclick="switchView('list')">RETOUR</button>
            </div>
        </div>

        <!-- TAB BAR -->
        <nav class="tab-bar">
            <div class="tab-item active" id="tab-dashboard" onclick="switchView('dashboard')">
                <span class="tab-icon">🏠</span><span>Accueil</span>
            </div>
            <div class="tab-item" id="tab-list" onclick="switchView('list')">
                <span class="tab-icon">📚</span><span>Mots</span>
            </div>
        </nav>
    </div>

    <script>
        let db, session = [], currentIndex = 0;
        let userData = JSON.parse(localStorage.getItem('vocabUser')) || { xp: 0, streak: 0, lastVisit: null };
        let hintUsed = false;
        let rebusState = { currentAnswer: [], targetWord: "" };

        const initialVocab = [
            { en: "Postpone", fr: "Remettre à plus tard / reporter" },
            { en: "Implement", fr: "Appliquer" },
            { en: "else", fr: "Quoi d'autre" },
            { en: "Other ways", fr: "Autre manières / autre chemins" },
            { en: "Get used to", fr: "S'habituer à" },
            { en: "Be used to", fr: "Etre habitué à" },
            { en: "I am getting used to", fr: "Je suis en train de m'habituer à" },
            { en: "Foot traffic", fr: "Circulation piétonne" },
            { en: "Defer", fr: "Reporter" },
            { en: "Diter", fr: "Dire" },
            { en: "Differ", fr: "Différer" },
            { en: "Deflect", fr: "Dévier" },
            { en: "Share price", fr: "Action (d'entreprise)" },
            { en: "So far", fr: "Jusqu'à présent" },
            { en: "A survey", fr: "Enquête, sondage" },
            { en: "Ensure", fr: "S'assurer" },
            { en: "The board of director", fr: "Le conseil d'administration" },
            { en: "Currently", fr: "Actuellement (action en cours)" },
            { en: "Quarter", fr: "Trimestre" },
            { en: "Upcoming", fr: "À venir" },
            { en: "By the time", fr: "Au moment de/où" },
            { en: "Regarding", fr: "Concernant" },
            { en: "Complaint", fr: "Plainte" },
            { en: "Roughly", fr: "Grossièrement" },
            { en: "Strikes", fr: "Grève / force de frappe" },
            { en: "Wounded", fr: "Blessé" },
            { en: "Ceasefire", fr: "Cessez-le-feu" },
            { en: "Take over", fr: "Prendre le contrôle" },
            { en: "Conveyance", fr: "Transfert (logistique)" },
            { en: "Convenience", fr: "Pratique / commode" },
            { en: "Unforeseen", fr: "Imprévu" },
            { en: "Barring", fr: "Sauf en cas de" },
            { en: "Assuming", fr: "En supposant" },
            { en: "Stated", fr: "Déclaré" },
            { en: "Compliant", fr: "Conforme" },
            { en: "Revamp", fr: "Rénover" },
            { en: "Relapse", fr: "Rechute" },
            { en: "Accrued", fr: "Accumuler / réunir progressivement" },
            { en: "Adhered", fr: "Respecter" },
            { en: "Accosted", fr: "Abordé" },
            { en: "Comply", fr: "Se conformer" },
            { en: "Curtail", fr: "Limiter / réduire" },
            { en: "Commitment", fr: "Engagement" },
            { en: "Prompted", fr: "Provoqué / suscité par" }
        ];

        const req = indexedDB.open("VocabMasterUltimate", 1); // Nouveau nom pour forcer reset
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            d.createObjectStore("words", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => { db = e.target.result; seed(); };

        function seed() {
            const store = db.transaction("words", "readwrite").objectStore("words");
            store.count().onsuccess = (ev) => {
                if (ev.target.result === 0) {
                    initialVocab.forEach(v => store.add({ ...v, repetition: 0, interval: 0, efactor: 2.5, direction: 'FR_EN', nextReview: Date.now() }));
                }
                updateDashboard();
            };
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');

            // Cacher la barre de navigation pendant la révision
            const tabBar = document.querySelector('.tab-bar');
            if (v === 'review') {
                tabBar.style.display = 'none';
            } else {
                tabBar.style.display = 'flex';
            }

            document.querySelectorAll('.tab-item').forEach(it => it.classList.remove('active'));
            if (document.getElementById('tab-' + v)) document.getElementById('tab-' + v).classList.add('active');
            if (v === 'list') renderList();
            if (v === 'dashboard') updateDashboard();
        }

        async function updateDashboard() {
            if (!db) return;
            const level = Math.floor(userData.xp / 100) + 1;
            document.getElementById('user-level').innerText = "Expert - Niveau " + level;
            document.getElementById('xp-progress').style.width = (userData.xp % 100) + "%";
            document.getElementById('user-xp').innerText = (userData.xp % 100);
            document.getElementById('stat-streak').innerText = "🔥 " + userData.streak;
            const all = await new Promise(r => db.transaction("words").objectStore("words").getAll().onsuccess = (e) => r(e.target.result));
            document.getElementById('stat-due').innerText = all.filter(w => w.nextReview <= Date.now()).length;
        }

        function renderList() {
            db.transaction("words").objectStore("words").getAll().onsuccess = (e) => {
                document.getElementById('word-list').innerHTML = e.target.result.map(w => `
                <div class="word-item" onclick="showEditForm(${w.id}, '${w.fr.replace(/'/g, "\\'")}', '${w.en.replace(/'/g, "\\'")}')">
                    <b>${w.fr}</b> <span>➔ ${w.en}</span>
                </div>`).join('');
            };
        }

        function showEditForm(id, fr, en) {
            document.getElementById('edit-id').value = id || '';
            document.getElementById('edit-fr').value = fr;
            document.getElementById('edit-en').value = en;
            document.getElementById('del-btn').style.display = id ? 'block' : 'none';
            switchView('edit');
        }

        function saveWord() {
            const id = document.getElementById('edit-id').value, fr = document.getElementById('edit-fr').value.trim(), en = document.getElementById('edit-en').value.trim();
            if (!fr || !en) return;
            const store = db.transaction("words", "readwrite").objectStore("words");
            if (id) store.get(Number(id)).onsuccess = (e) => store.put({ ...e.target.result, fr, en });
            else store.add({ fr, en, repetition: 0, interval: 0, efactor: 2.5, direction: 'FR_EN', nextReview: Date.now() });
            setTimeout(() => switchView('list'), 100);
        }

        function deleteWord() {
            if (confirm("Supprimer ?")) db.transaction("words", "readwrite").objectStore("words").delete(Number(document.getElementById('edit-id').value)).onsuccess = () => switchView('list');
        }

        async function startSession() {
            const words = await new Promise(r => db.transaction("words").objectStore("words").getAll().onsuccess = (e) => r(e.target.result));
            
            // On prend les mots à réviser en priorité
            let due = words.filter(w => w.nextReview <= Date.now()).sort(() => Math.random() - 0.5);
            
            // Si pas assez de mots dus, on prend des nouveaux ou aléatoires
            if (due.length < 20) {
                const other = words.filter(w => w.nextReview > Date.now()).sort(() => Math.random() - 0.5);
                due = [...due, ...other];
            }

            if (due.length === 0) return alert("Ajoutez des mots d'abord !");

            // Session de 20 mots : 10 flashcards, 10 rebus
            session = due.slice(0, 20);
            currentIndex = 0;
            showCard();
            switchView('review');
        }

        async function showCard() {
            const w = session[currentIndex];
            hintUsed = false;
            
            // Mode : 0-9 Flashcards, 10-19 Rebus
            let mode = (currentIndex < 10) ? 'flash' : 'rebus';

            document.getElementById('review-progress').innerText = (currentIndex + 1) + "/" + session.length;
            document.getElementById('mode-badge').innerText = mode === 'rebus' ? '🧩 MODE REBUS' : '🧠 MÉMORISATION';
            document.getElementById('mode-badge').style.background = mode === 'rebus' ? 'var(--secondary)' : 'var(--primary)';

            document.getElementById('card-question').innerText = w.direction === 'FR_EN' ? "Traduction Anglaise ?" : "Traduction Française ?";
            document.getElementById('card-main-text').innerText = w.direction === 'FR_EN' ? w.fr : w.en;

            // Reset UI
            document.getElementById('rebus-zone').style.display = mode === 'rebus' ? 'block' : 'none';
            document.getElementById('card-main-text').style.display = mode === 'rebus' ? 'none' : 'block';
            document.getElementById('flash-actions').style.display = mode === 'flash' ? 'block' : 'none';
            document.getElementById('score-actions').style.display = 'none';
            document.getElementById('hint-display').style.display = 'none';
            document.getElementById('btn-hint').style.display = 'flex';

            if (mode === 'rebus') {
                setupRebus(w);
                getAIHint(true); // Indice d'office pour le rebus
            }
        }

        function setupRebus(w) {
            const target = (w.direction === 'FR_EN' ? w.en : w.fr).toUpperCase();
            rebusState.targetWord = target;
            rebusState.currentAnswer = [];
            
            const letters = target.split('').sort(() => Math.random() - 0.5);
            const container = document.getElementById('rebus-letters');
            const answerContainer = document.getElementById('rebus-answer');
            
            container.innerHTML = '';
            answerContainer.innerHTML = '_ '.repeat(target.length);
            
            letters.forEach((l, idx) => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = l;
                tile.onclick = () => selectLetter(l, tile);
                container.appendChild(tile);
            });
        }

        function selectLetter(l, tile) {
            tile.classList.add('used');
            rebusState.currentAnswer.push(l);
            
            const target = rebusState.targetWord;
            const display = rebusState.currentAnswer.join('') + '_ '.repeat(target.length - rebusState.currentAnswer.length);
            document.getElementById('rebus-answer').innerText = display;

            if (rebusState.currentAnswer.length === target.length) {
                if (rebusState.currentAnswer.join('') === target) {
                    userData.xp += 15;
                    setTimeout(() => submitScore(5), 500);
                } else {
                    alert("Raté ! On recommence le rebus.");
                    setupRebus(session[currentIndex]);
                }
            }
        }

        async function getAIHint(isAuto = false) {
            if (!isAuto) hintUsed = true;
            const w = session[currentIndex];
            const target = w.direction === 'FR_EN' ? w.en : w.fr;
            const display = document.getElementById('hint-display');
            
            display.innerText = "Récupération de l'indice...";
            display.style.display = 'block';
            if (!isAuto) document.getElementById('btn-hint').style.display = 'none';

            try {
                const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${target.toLowerCase()}`);
                const data = await resp.json();
                const hint = data[0]?.meanings[0]?.definitions[0]?.definition || "Pas d'indice disponible.";
                display.innerText = "Indice : " + hint;
            } catch (e) {
                display.innerText = "Indice : Commence par '" + target[0] + "' et finit par '" + target[target.length-1] + "'";
            }
        }

        function revealCard() {
            const w = session[currentIndex];
            document.getElementById('card-main-text').innerText = w.direction === 'FR_EN' ? w.en : w.fr;
            document.getElementById('flash-actions').style.display = 'none';
            document.getElementById('score-actions').style.display = 'grid';
        }

        function checkCloze() {
            const w = session[currentIndex], ans = (w.direction === 'FR_EN' ? w.en : w.fr).toLowerCase().trim();
            if (document.getElementById('cloze-input').value.toLowerCase().trim() === ans) {
                userData.xp += 15; submitScore(5);
            } else {
                alert("Raté ! La réponse était : " + ans); submitScore(1);
            }
        }

        async function submitScore(q) {
            const w = session[currentIndex];
            let { repetition: r, interval: i, efactor: f } = w;

            // Logique XP : uniquement pour Bien (4) ou Facile (5)
            if (q === 4) userData.xp += 5;
            if (q === 5) userData.xp += 10;

            // Si un indice a été utilisé, on force le score à 1 (Revoir)
            if (hintUsed && currentIndex < 10) {
                q = 1;
                console.log("Pénalité indice appliquée");
            }

            if (q < 3) { r = 0; i = 1; } else {
                if (r === 0) i = 1; else if (r === 1) i = 6; else i = Math.round(i * f);
                r++;
            }
            f = Math.max(1.3, f + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
            const up = { ...w, repetition: r, interval: i, efactor: f, direction: r % 2 === 0 ? 'EN_FR' : 'FR_EN', nextReview: Date.now() + i * 86400000 };

            const tx = db.transaction("words", "readwrite");
            tx.objectStore("words").put(up);
            tx.oncomplete = () => {
                localStorage.setItem('vocabUser', JSON.stringify(userData));
                currentIndex++;
                if (currentIndex < session.length) {
                    showCard();
                } else {
                    alert("Session terminée ! Bravo.");
                    switchView('dashboard');
                }
            };
            tx.onerror = () => {
                alert("Erreur de sauvegarde. On continue...");
                currentIndex++;
                if (currentIndex < session.length) showCard(); else switchView('dashboard');
            };
        }

        window.onload = () => switchView('dashboard');
    </script>
</body>

</html>
