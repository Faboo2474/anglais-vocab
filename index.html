<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocabMaster AI v5</title>
    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --secondary: #ec4899;
            --background: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc; --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--background); color: var(--text); height: 100vh; overflow: hidden; }
        
        #app { height: 100%; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top, 20px); }
        
        .view { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .view.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 10px; text-align: center; }
        .xp-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .xp-progress { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.5s; width: 0%; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0; }
        .stat-card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-val { font-size: 24px; font-weight: bold; color: white; }

        .card { background: linear-gradient(145deg, rgba(45,55,72,0.9), rgba(15,23,42,0.9)); border-radius: 30px; padding: 30px 15px; text-align: center; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); min-height: 280px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; 
            padding-top: 15px;
            padding-bottom: calc(30px + env(safe-area-inset-bottom, 20px)); /* MARGE ACCRUE ICI */
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 9999;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 12px; gap: 5px; flex: 1; }
        .tab-item.active { color: var(--primary-light); font-weight: bold; }
        .tab-icon { font-size: 24px; }

        .word-item { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        .sentence-box { font-size: 17px; font-style: italic; color: #fff; margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

<div id="app">
    <!-- DASHBOARD -->
    <div id="view-dashboard" class="view active">
        <div class="header">
            <h2 id="user-level" style="font-size:1.1rem">Niveau 1</h2>
            <div class="xp-bar"><div id="xp-progress" class="xp-progress"></div></div>
            <p style="margin-top:5px; font-size:11px;"><span id="user-xp">0</span> / 100 XP</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div id="stat-streak" class="stat-val">🔥 0</div><div style="font-size:10px; color:var(--text-muted)">SERIE</div></div>
            <div class="stat-card"><div id="stat-due" class="stat-val">0</div><div style="font-size:10px; color:var(--text-muted)">A REVISER</div></div>
        </div>
        <button class="btn" style="background: linear-gradient(135deg, #6366f1, #ec4899); height: 80px;" onclick="startSession()">RÉVISER</button>
    </div>

    <!-- REVIEW -->
    <div id="view-review" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="review-progress" style="font-size:12px; color:var(--text-muted)">0/0</span>
            <span id="mode-badge" style="background:var(--primary); padding:3px 10px; border-radius:15px; font-size:10px;">EXERCICE</span>
            <span onclick="switchView('dashboard')" style="color:var(--text-muted)">Quitter</span>
        </div>
        <div class="card">
            <div id="card-question" style="font-size: 11px; color:var(--text-muted); margin-bottom:10px;">...</div>
            <div id="card-main-text" style="font-size: 26px; font-weight: bold;">...</div>
            <div id="ai-context" style="display:none;"><div class="sentence-box" id="sentence-display">IA...</div></div>
            <div id="cloze-zone" style="display:none; margin-top:15px;">
                <input type="text" id="cloze-input" style="text-align:center; border:none; border-bottom:2px solid var(--primary); background:transparent; font-size:20px;" placeholder="Votre réponse">
            </div>
        </div>
        <div id="flash-actions"><button class="btn" onclick="revealCard()">RÉPONSE</button></div>
        <div id="score-actions" style="display:none; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <button class="btn" style="background:#475569" onclick="submitScore(1)">Revoir</button>
            <button class="btn" style="background:#ea580c" onclick="submitScore(3)">Dur</button>
            <button class="btn" style="background:#2563eb" onclick="submitScore(4)">Bien</button>
            <button class="btn" style="background:#16a34a" onclick="submitScore(5)">Facile</button>
        </div>
        <div id="cloze-actions" style="display:none;"><button class="btn" onclick="checkCloze()">VÉRIFIER</button></div>
    </div>

    <!-- LIST -->
    <div id="view-list" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="font-size:1.5rem">Mots</h1>
            <button class="btn" style="width:auto; padding:8px 15px; margin:0;" onclick="showEditForm(null, '', '')">+ AJOUTER</button>
        </div>
        <div id="word-list"></div>
    </div>

    <!-- EDIT -->
    <div id="view-edit" class="view">
        <h2 id="edit-title">Éditer</h2>
        <div style="margin-top:15px;">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-fr" placeholder="Français">
            <input type="text" id="edit-en" placeholder="Anglais">
            <button class="btn" onclick="saveWord()">SAUVER</button>
            <button id="del-btn" class="btn" style="background:#ef4444" onclick="deleteWord()">SUPPRIMER</button>
            <button class="btn" style="background:transparent; border:1px solid rgba(255,255,255,0.1)" onclick="switchView('list')">RETOUR</button>
        </div>
    </div>

    <!-- TAB BAR -->
    <nav class="tab-bar">
        <div class="tab-item active" id="tab-dashboard" onclick="switchView('dashboard')">
            <span class="tab-icon">🏠</span><span>Accueil</span>
        </div>
        <div class="tab-item" id="tab-list" onclick="switchView('list')">
            <span class="tab-icon">📚</span><span>Mots</span>
        </div>
    </nav>
</div>

<script>
    let db, session = [], currentIndex = 0;
    let userData = JSON.parse(localStorage.getItem('vocabUser')) || { xp: 0, streak: 0, lastVisit: null };

    const initialVocab = [
        { en: "Postpone", fr: "Remettre à plus tard / reporter" },
        { en: "Implement", fr: "Appliquer" },
        { en: "else", fr: "Quoi d'autre" },
        { en: "Other ways", fr: "Autre manières / autre chemins" },
        { en: "Get used to", fr: "S'habituer à" },
        { en: "Be used to", fr: "Etre habitué à" },
        { en: "I am getting used to", fr: "Je suis en train de m'habituer à" },
        { en: "Foot traffic", fr: "Circulation piétonne" },
        { en: "Defer", fr: "Reporter" },
        { en: "Diter", fr: "Dire" },
        { en: "Differ", fr: "Différer" },
        { en: "Deflect", fr: "Dévier" },
        { en: "Share price", fr: "Action (d'entreprise)" },
        { en: "So far", fr: "Jusqu'à présent" },
        { en: "A survey", fr: "Enquête, sondage" },
        { en: "Ensure", fr: "S'assurer" },
        { en: "The board of director", fr: "Le conseil d'administration" },
        { en: "Currently", fr: "Actuellement (action en cours)" },
        { en: "Quarter", fr: "Trimestre" },
        { en: "Upcoming", fr: "À venir" },
        { en: "By the time", fr: "Au moment de/où" },
        { en: "Regarding", fr: "Concernant" },
        { en: "Complaint", fr: "Plainte" },
        { en: "Roughly", fr: "Grossièrement" },
        { en: "Strikes", fr: "Grève / force de frappe" },
        { en: "Wounded", fr: "Blessé" },
        { en: "Ceasefire", fr: "Cessez-le-feu" },
        { en: "Take over", fr: "Prendre le contrôle" },
        { en: "Conveyance", fr: "Transfert (logistique)" },
        { en: "Convenience", fr: "Pratique / commode" },
        { en: "Unforeseen", fr: "Imprévu" },
        { en: "Barring", fr: "Sauf en cas de" },
        { en: "Assuming", fr: "En supposant" },
        { en: "Stated", fr: "Déclaré" },
        { en: "Compliant", fr: "Conforme" },
        { en: "Revamp", fr: "Rénover" },
        { en: "Relapse", fr: "Rechute" },
        { en: "Accrued", fr: "Accumuler / réunir progressivement" },
        { en: "Adhered", fr: "Respecter" },
        { en: "Accosted", fr: "Abordé" },
        { en: "Comply", fr: "Se conformer" },
        { en: "Curtail", fr: "Limiter / réduire" },
        { en: "Commitment", fr: "Engagement" },
        { en: "Prompted", fr: "Provoqué / suscité par" }
    ];

    const req = indexedDB.open("VocabMasterUltimate", 1); // Nouveau nom pour forcer reset
    req.onupgradeneeded = (e) => {
        const d = e.target.result;
        d.createObjectStore("words", { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = (e) => { db = e.target.result; seed(); };

    function seed() {
        const store = db.transaction("words", "readwrite").objectStore("words");
        store.count().onsuccess = (ev) => {
            if(ev.target.result === 0) {
                initialVocab.forEach(v => store.add({...v, repetition:0, interval:0, efactor:2.5, direction:'FR_EN', nextReview:Date.now()}));
            }
            updateDashboard();
        };
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.querySelectorAll('.tab-item').forEach(it => it.classList.remove('active'));
        if(document.getElementById('tab-'+v)) document.getElementById('tab-'+v).classList.add('active');
        if(v === 'list') renderList();
        if(v === 'dashboard') updateDashboard();
    }

    async function updateDashboard() {
        if(!db) return;
        const level = Math.floor(userData.xp / 100) + 1;
        document.getElementById('user-level').innerText = "Expert - Niveau " + level;
        document.getElementById('xp-progress').style.width = (userData.xp % 100) + "%";
        document.getElementById('user-xp').innerText = (userData.xp % 100);
        document.getElementById('stat-streak').innerText = "🔥 " + userData.streak;
        const all = await new Promise(r => db.transaction("words").objectStore("words").getAll().onsuccess = (e) => r(e.target.result));
        document.getElementById('stat-due').innerText = all.filter(w => w.nextReview <= Date.now()).length;
    }

    function renderList() {
        db.transaction("words").objectStore("words").getAll().onsuccess = (e) => {
            document.getElementById('word-list').innerHTML = e.target.result.map(w => `
                <div class="word-item" onclick="showEditForm(${w.id}, '${w.fr.replace(/'/g,"\\'")}', '${w.en.replace(/'/g,"\\'")}')">
                    <b>${w.fr}</b> <span>➔ ${w.en}</span>
                </div>`).join('');
        };
    }

    function showEditForm(id, fr, en) {
        document.getElementById('edit-id').value = id || '';
        document.getElementById('edit-fr').value = fr;
        document.getElementById('edit-en').value = en;
        document.getElementById('del-btn').style.display = id ? 'block' : 'none';
        switchView('edit');
    }

    function saveWord() {
        const id = document.getElementById('edit-id').value, fr = document.getElementById('edit-fr').value.trim(), en = document.getElementById('edit-en').value.trim();
        if(!fr || !en) return;
        const store = db.transaction("words", "readwrite").objectStore("words");
        if(id) store.get(Number(id)).onsuccess = (e) => store.put({...e.target.result, fr, en});
        else store.add({ fr, en, repetition: 0, interval: 0, efactor: 2.5, direction: 'FR_EN', nextReview: Date.now() });
        setTimeout(() => switchView('list'), 100);
    }

    function deleteWord() {
        if(confirm("Supprimer ?")) db.transaction("words", "readwrite").objectStore("words").delete(Number(document.getElementById('edit-id').value)).onsuccess = () => switchView('list');
    }

    async function startSession() {
        const words = await new Promise(r => db.transaction("words").objectStore("words").getAll().onsuccess = (e) => r(e.target.result));
        // On mélange un peu et on prend 15 mots max
        const due = words.filter(w => w.nextReview <= Date.now()).sort(() => Math.random() - 0.5);
        
        if(due.length === 0) return alert("Rien à réviser !");
        
        session = due.slice(0, 15);
        currentIndex = 0; 
        showCard(); 
        switchView('review');
    }

    async function showCard() {
        const w = session[currentIndex];
        // 10 premières : Flash, après 10 : Cloze
        const mode = (currentIndex < 10) ? 'flash' : 'cloze';
        
        document.getElementById('review-progress').innerText = (currentIndex+1)+"/"+session.length;
        document.getElementById('mode-badge').innerText = mode === 'cloze' ? 'CHALLENGE IA' : 'MÉMORISATION';
        document.getElementById('mode-badge').style.background = mode === 'cloze' ? 'var(--secondary)' : 'var(--primary)';
        
        document.getElementById('card-question').innerText = w.direction === 'FR_EN' ? "Traduction Anglaise ?" : "Traduction Française ?";
        document.getElementById('card-main-text').innerText = w.direction === 'FR_EN' ? w.fr : w.en;
        
        document.getElementById('ai-context').style.display = mode === 'cloze' ? 'block' : 'none';
        document.getElementById('cloze-zone').style.display = mode === 'cloze' ? 'block' : 'none';
        document.getElementById('flash-actions').style.display = mode === 'cloze' ? 'none' : 'block';
        document.getElementById('cloze-actions').style.display = mode === 'cloze' ? 'block' : 'none';
        document.getElementById('score-actions').style.display = 'none';

        if(mode === 'cloze') {
            document.getElementById('sentence-display').innerText = "Génération de la phrase...";
            const target = w.direction === 'FR_EN' ? w.en : w.fr;
            try {
                const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${target.toLowerCase()}`);
                const data = await resp.json();
                const ex = data[0]?.meanings[0]?.definitions.find(d => d.example)?.example;
                document.getElementById('sentence-display').innerText = ex ? ex.replace(new RegExp(target, 'gi'), "_______") : "Trouvez la traduction de : "+w.fr;
            } catch(e) { document.getElementById('sentence-display').innerText = "Trouvez la traduction de : "+w.fr; }
            document.getElementById('cloze-input').value = ""; document.getElementById('cloze-input').focus();
        }
    }

    function revealCard() {
        const w = session[currentIndex];
        document.getElementById('card-main-text').innerText = w.direction === 'FR_EN' ? w.en : w.fr;
        document.getElementById('flash-actions').style.display = 'none';
        document.getElementById('score-actions').style.display = 'grid';
    }

    function checkCloze() {
        const w = session[currentIndex], ans = (w.direction === 'FR_EN' ? w.en : w.fr).toLowerCase().trim();
        if(document.getElementById('cloze-input').value.toLowerCase().trim() === ans) {
            userData.xp += 15; submitScore(5);
        } else {
            alert("Raté ! La réponse était : " + ans); submitScore(1);
        }
    }

    function submitScore(q) {
        const w = session[currentIndex];
        let {repetition:r, interval:i, efactor:f} = w;
        if(q<3) { r=0; i=1; } else {
            if(r===0) i=1; else if(r===1) i=6; else i=Math.round(i*f);
            r++; userData.xp += 5;
        }
        f = Math.max(1.3, f+(0.1-(5-q)*(0.08+(5-q)*0.02)));
        const up = { ...w, repetition:r, interval:i, efactor:f, direction: r%2===0?'EN_FR':'FR_EN', nextReview: Date.now() + i*86400000 };
        db.transaction("words", "readwrite").objectStore("words").put(up).oncomplete = () => {
            localStorage.setItem('vocabUser', JSON.stringify(userData));
            currentIndex++; if(currentIndex < session.length) showCard(); else switchView('dashboard');
        };
    }

    window.onload = () => switchView('dashboard');
</script>
</body>
</html>
